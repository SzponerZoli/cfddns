<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Cloudflare DDNS</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto w-full max-w-md px-4 py-10">
      <section class="rounded-xl border border-slate-800 bg-slate-900 p-5">
        <h1 class="text-2xl font-semibold">Cloudflare DDNS Login</h1>
        <p class="mt-1 text-slate-400">Sign in to manage DNS profiles.</p>

        {% if error %}
          <p class="mt-3 rounded-lg border border-red-800 bg-red-950 px-3 py-2 text-red-300">{{ error }}</p>
        {% endif %}

        <form class="mt-4" method="post" action="/login">
          <label class="mb-1 block text-sm text-slate-300">Username</label>
          <input class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" type="text" name="username" required />

          <label class="mb-1 mt-3 block text-sm text-slate-300">Password</label>
          <input class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" type="password" name="password" required />

          <button class="mt-4 w-full rounded-lg bg-blue-600 px-4 py-2 font-medium hover:bg-blue-700" type="submit">Login</button>
        </form>
      </section>
    </main>
  </body>
</html>
